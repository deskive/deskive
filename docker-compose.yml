# Deskive - Full Stack Setup
# Usage: docker compose up -d
# Then visit http://localhost:5175 (frontend) and http://localhost:3002 (backend API)

services:
  postgres:
    image: postgres:15-alpine
    container_name: deskive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-deskive_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deskive-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: deskive-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: deskive-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-test_master_key}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  typesense:
    image: typesense/typesense:27.1
    container_name: deskive-typesense
    restart: unless-stopped
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-test_api_key}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY:-test_api_key}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: deskive-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-deskive_dev}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-test_master_key}
      TYPESENSE_HOST: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-test_api_key}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-pg-trgm}
      FRONTEND_URL: http://localhost:5175
      CORS_ORIGIN: http://localhost:5175,http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_min32chars_change_me_in_production}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4o-mini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: deskive-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5175}:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3002/api
      VITE_WS_URL: ws://localhost:3002
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  meilisearch_data:
    driver: local
  typesense_data:
    driver: local
